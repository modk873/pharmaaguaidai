<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1f6fff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>404 - Page Not Found | PharmaCare</title>

<link rel="stylesheet" href="style.css">

<style>
  .error-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    text-align: center;
  }

  .error-code {
    font-size: clamp(6rem, 20vw, 10rem);
    font-weight: 800;
    color: var(--color-primary);
    line-height: 1;
    margin-bottom: 20px;
  }

  .error-title {
    font-size: clamp(1.5rem, 5vw, 2rem);
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--color-text);
  }

  .error-desc {
    font-size: 1.0625rem;
    color: var(--color-text-muted);
    margin-bottom: 32px;
    max-width: 500px;
    line-height: 1.6;
  }

  .error-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 300px;
  }

  .error-btn {
    width: 100%;
    padding: 14px 20px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .error-btn-primary {
    background: var(--color-primary);
    color: #fff;
    box-shadow: 0 4px 12px rgba(31, 111, 255, 0.3);
  }

  .error-btn-primary:hover {
    background: var(--color-primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(31, 111, 255, 0.4);
  }

  .error-btn-secondary {
    background: var(--color-accent-soft);
    color: var(--color-text);
    border: 2px solid var(--color-border);
    box-shadow: none;
  }

  .error-btn-secondary:hover {
    background: var(--color-bg);
    transform: translateY(-2px);
  }
</style>

</head>

<body>

<div class="error-page">
  <div class="error-code">404</div>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  
  <div class="error-actions">
    <a href="index.html" class="error-btn error-btn-primary">Go to Homepage</a>
    <button onclick="history.back()" class="error-btn error-btn-secondary">Go Back</button>
  </div>
</div>

</body>

</html>
